{% extends "base.html" %}
{% block content %}
<h2>All Students</h2>
<p>Total Students: {{ total }}</p>
<table class="table table-bordered">
  <thead>
    <tr><th>Name</th><th>Roll No</th><th>SGPA</th></tr>
  </thead>
  <tbody>
    {% for student in results %}
    <tr>
      <td>{{ student.name }}</td>
      <td>{{ student.roll_no }}</td>
      <td>{{ student.sgpa }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
